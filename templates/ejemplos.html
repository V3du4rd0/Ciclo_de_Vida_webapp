<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejemplos</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      font-family: Arial, sans-serif;
      background-color: white;
    }

    h2 {
      margin-top: 50px;
      color: #00bfa5;
      font-size: 28px;
      text-align: center;
    }

    .menu {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
      width: 80%;
      align-items: center;
    }

    .button {
      width: 100%;
      max-width: 300px;
      padding: 20px;
      background-color: #4dd0e1;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 18px;
      text-align: center;
      text-decoration: none;
      display: block;
    }

    .home {
      margin: 30px 0;
    }

    .home a {
      text-decoration: none;
      display: block;
      text-align: center;
    }

    .home-icon {
      width: 40px;
      height: auto;
    }
  </style>
</head>
<body>

  <h2>ELIGE TU<br>PROYECTO</h2>

  <div class="menu">
    <a href="{{ url_for('ejemplo_maqueta') }}" class="button">MAQUETA</a>
    <a href="{{ url_for('ejemplo_velaria') }}" class="button">VELARIA</a>
    <a href="{{ url_for('ejemplo_impresion3D') }}" class="button">PROTOTIPO 3D</a>
  </div>

  <div class="home">
    <a href="{{ url_for('menu') }}">
      <img src="{{ url_for('static', filename='assets/homeIcon.png') }}" 
           alt="Home" 
           class="home-icon">
    </a>
  </div>

</body>
</html>
